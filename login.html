<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.gstatic.com https://apis.google.com https://www.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://res.cloudinary.com https://images.unsplash.com; connect-src https://*.firebaseio.com https://*.googleapis.com http://127.0.0.1:5500;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    
    <meta name="referrer" content="strict-origin-when-cross-origin">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S-LAB Login</title>
<link rel="stylesheet" href="login.css">
</head>
<body>

<div class="overlay"></div>

<div class="login-box">
    <h1>S-LAB</h1>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <div class="options">
        <label>
            <input type="checkbox" id="remember">
            Remember Me
        </label>
        <a href="#" onclick="forgotPassword()">
            Forgot Password?
        </a>
    </div>
    <button onclick="login()">LOGIN</button>
    <p id="msg"></p>
    <p class="signup">
        <a href="register.html">Create Account</a>
    </p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAAeCnftvLiKJcj04iFuv6OWovtnv_r2TE",
  authDomain: "fir-lab-49901.firebaseapp.com",
  projectId: "fir-lab-49901",
  storageBucket: "fir-lab-49901.firebasestorage.app",
  messagingSenderId: "145493212453",
  appId: "1:145493212453:web:b93743eab8dde5c0beeecc",
  measurementId: "G-J4KWKT4Z5L"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function(){
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    if(!email || !password){
        msg.style.color = "red";
        msg.innerText = "Please fill all fields";
        return;
    }

    try{
        await signInWithEmailAndPassword(auth, email, password);
        msg.style.color = "lightgreen";
        msg.innerText = "Login Successful ✔";
        setTimeout(()=>{
            window.location.href = "shop.html";
        }, 1500);
    } catch(error){
        msg.style.color = "red";
        msg.innerText = error.message;
    }
}

window.forgotPassword = async function(){
    const email = document.getElementById("email").value.trim();
    const msg = document.getElementById("msg");

    if(!email){
        msg.style.color = "red";
        msg.innerText = "Enter your email first";
        return;
    }

    try{
        await sendPasswordResetEmail(auth, email);
        msg.style.color = "lightgreen";
        msg.innerText = "Password reset email sent ✔";
    } catch(error){
        msg.style.color = "red";
        msg.innerText = error.message;
    }
}
</script>

</body>
</html>
